name: Claude PR Review
on:
  pull_request:
    types: [opened, synchronize]

jobs:
  review:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          prompt: |
            Review this PR for:
            1. Adherence to CLAUDE.md principles (KISS, YAGNI, SOLID, raw asyncpg, no ORM)
            2. Security (SQL injection in raw queries, SSE issues, auth bypass)
            3. Async correctness (proper await, connection pool usage)
            4. Test coverage for new code
            Be concise. Post inline comments on specific lines.
          claude_args: "--max-turns 5"
