name: Bug Report
description: Report a bug for autonomous fixing
labels: ["bug", "claude", "triage"]
body:
  - type: textarea
    id: description
    attributes:
      label: Bug Description
      description: What's broken?
    validations:
      required: true
  - type: textarea
    id: reproduce
    attributes:
      label: Steps to Reproduce
      description: How can we trigger this bug?
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
      description: What should happen instead?
  - type: textarea
    id: files
    attributes:
      label: Relevant Files
      description: Which files/modules are likely involved?
